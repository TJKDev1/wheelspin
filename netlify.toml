[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "https://wheelspin.cc/*"
  to = "https://www.wheelspin.cc/:splat"
  status = 301
  force = true

[[headers]]
  for = "/"
  [headers.values]
    X-Robots-Tag = "index, follow"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self' 'sha256-7V6l3DkeIUIAyLGiuysDqvxqkduvpu3JZxFdexkMJWg='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; media-src 'self'; worker-src 'none'"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "clipboard-read=(self), clipboard-write=(self), web-share=(self)"

[[headers]]
  for = "/og-image.*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
